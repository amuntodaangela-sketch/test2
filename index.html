<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me?</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            background-color: #ffebee;
            overflow: hidden;
            margin: 0;
        }
        h1 { color: #d81b60; }
        .container { text-align: center; }
        
        #btnYes {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        #btnNo {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container" id="main">
        <h1 id="question">Do you love me?</h1>
        <div id="buttons">
            <button id="btnYes" onclick="accepted()">Yes</button>
            <button id="btnNo" onmouseover="moveButton()" onclick="moveButton()">No</button>
        </div>
    </div>
    

    <script>
        let yesSize = 18;
        let clickCount = 0;

        function moveButton() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            
            const btnNo = document.getElementById('btnNo');
            btnNo.style.position = 'absolute';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';

            
            yesSize += 40; 
            const btnYes = document.getElementById('btnYes');
            btnYes.style.fontSize = yesSize + 'px';
            btnYes.style.padding = (yesSize / 2) + 'px ' + yesSize + 'px';

         
            if (yesSize > 500) {
                btnYes.style.position = 'fixed';
                btnYes.style.top = '0';
                btnYes.style.left = '0';
                btnYes.style.width = '100vw';
                btnYes.style.height = '100vh';
                btnYes.innerText = 'YES!';
            }
        }

        function accepted() {
            document.getElementById('main').innerHTML = "<h1>I Love You Too! ❤️</h1>";
        }
    </script>
</body>
</html>
